name: Create or Update Draft Release

on:
  push:
    branches:
    - main
  repository_dispatch:
    types: [ version-bump ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version of the release to cut (e.g. 1.2.3)'
        required: false

concurrency: release

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-24.04
    outputs:
      builders: ${{ steps.builders.outputs.builders }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
    - name: Run Unit Tests
      run: ./scripts/unit.sh
    - name: Get builders from integration.json
      id: builders
      run: |
        source "${{ github.workspace }}/scripts/.util/builders.sh"
        builders="$(util::builders::list "${{ github.workspace }}/integration.json")"
        printf "Output: %s\n" "${builders}"
        printf "builders=%s\n" "${builders}" >> "$GITHUB_OUTPUT"

  integration:
    name: Integration Tests
    runs-on: ubuntu-24.04
    needs: unit
    strategy:
      matrix:
        builder: ${{ fromJSON(needs.unit.outputs.builders) }}
      fail-fast: false  # don't cancel all test jobs when one fails
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
    - name: Free Disk Space
      if: vars.RECLAIM_DISK_SPACE == 'true'
      uses: paketo-buildpacks/github-config/actions/pull-request/reclaim-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: false
        docker-images: true
        swap-storage: true

    # Causes errors with integration tests
    - name: Disable containerd snapshotter
      run: |
        echo '{"features": {"containerd-snapshotter": false}}' | sudo tee /etc/docker/daemon.json
        sudo systemctl restart docker

    - name: Run Integration Tests
      run: ./scripts/integration.sh --builder ${{ matrix.builder }} --token ${{ github.token }}
      env:
        TMPDIR: "${{ runner.temp }}"
        GIT_TOKEN: ${{ github.token }}

  release-prep:
    name: Release Prep
    runs-on: ubuntu-24.04
    needs: integration
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      buildpack_type: ${{ steps.get_buildpack_type.outputs.buildpack_type }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-tags: true

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Reset Draft Release
      id: reset
      uses: paketo-buildpacks/github-config/actions/release/reset-draft@main
      with:
        repo: ${{ github.repository }}
        token: ${{ github.token }}

    - name: Calculate Semver Tag
      if: github.event.inputs.version == ''
      id: semver
      uses: paketo-buildpacks/github-config/actions/tag/calculate-semver@main
      with:
        repo: ${{ github.repository }}
        token: ${{ github.token }}
        ref-name: ${{ github.ref_name }}

    - name: Set Release Tag
      id: tag
      run: |
        tag="${{ github.event.inputs.version }}"
        if [ -z "${tag}" ]; then
          tag="${{ steps.semver.outputs.tag }}"
        fi
        echo "tag=${tag}" >> "$GITHUB_OUTPUT"

    - name: Get buildpack type
      id: get_buildpack_type
      run: |
        if [ -f "extension.toml" ]; then
          echo "buildpack_type=extension" >> "$GITHUB_OUTPUT"
        else
          echo "buildpack_type=buildpack" >> "$GITHUB_OUTPUT"
        fi

    - name: Package
      run: ./scripts/package.sh --version "${{ steps.tag.outputs.tag }}"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: build/
        retention-days: 1

  generate-notes:
    name: Generate Release Notes (${{ matrix.buildpack }})
    runs-on: ubuntu-24.04
    needs: release-prep
    services:
      registry:
        image: registry:3
        ports:
          - 5000:5000
    strategy:
      matrix:
        buildpack:
          - jvm-vendors
          - adoptium
          - alibaba-dragonwell
          - amazon-corretto
          - azul-zulu
          - bellsoft-liberica
          - eclipse-openj9
          - graalvm
          - microsoft-openjdk
          - oracle
          - sap-machine
      fail-fast: false
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: build/

    # For jvm-vendors: use the full action which appends a Changes section (PR list since last release)
    - name: Create Release Notes
      id: create-release-notes
      if: matrix.buildpack == 'jvm-vendors'
      uses: paketo-buildpacks/github-config/actions/release/notes@main
      with:
        repo: ${{ github.repository }}
        token: ${{ secrets.PAKETO_BOT_GITHUB_TOKEN }}
        buildpack_type: ${{ needs.release-prep.outputs.buildpack_type }}
        buildpackage_path: build/${{ matrix.buildpack }}.cnb

    - name: Write Release Notes to file
      if: matrix.buildpack == 'jvm-vendors'
      run: |
        printf '${{ steps.create-release-notes.outputs.release_body }}' > ./release_notes_raw

    # For individual vendors: run jam summarize directly — no Changes section, which would be
    # identical across all vendors and would otherwise be duplicated 10 times in the final notes
    - name: Summarize Vendor Release Notes
      if: matrix.buildpack != 'jvm-vendors'
      run: |
        jam_version="$(curl "https://api.github.com/repos/paketo-buildpacks/jam/releases/latest" \
          --fail-with-body --show-error \
          --header "Authorization: token ${{ secrets.PAKETO_BOT_GITHUB_TOKEN }}" \
          --location --silent \
          | jq -r -S .tag_name)"

        mkdir -p "${HOME}/bin"
        export PATH="${HOME}/bin:${PATH}"
        curl "https://github.com/paketo-buildpacks/jam/releases/download/${jam_version}/jam-linux" \
          --fail-with-body --show-error --silent --location \
          --output "${HOME}/bin/jam"
        chmod +x "${HOME}/bin/jam"

        jam summarize \
          --${{ needs.release-prep.outputs.buildpack_type }} "build/${{ matrix.buildpack }}.cnb" \
          --format markdown > ./release_notes_raw

    - name: Get Image Digest
      id: image_digest
      run: |
        image_name="localhost:5000/${{ matrix.buildpack }}:latest"

        ./scripts/publish.sh \
          --buildpack-type ${{ needs.release-prep.outputs.buildpack_type }} \
          --archive-path "build/${{ matrix.buildpack }}.tgz" \
          --image-ref "${image_name}"

        echo "digest=$(sudo skopeo inspect "docker://${image_name}" --tls-verify=false | jq -r .Digest)" >> "$GITHUB_OUTPUT"

    - name: Set Correct Image Digest on Release Notes
      run: |
        sed -E \
          "s/\*\*Digest:\*\* \`sha256:[a-f0-9]{64}\`/\*\*Digest:\*\* \`${{ steps.image_digest.outputs.digest }}\`/" \
          ./release_notes_raw > ./release_notes_${{ matrix.buildpack }}

        printf '${{ steps.image_digest.outputs.digest }}' > ./${{ matrix.buildpack }}-index-digest.sha256

    - name: Upload release notes artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-notes-${{ matrix.buildpack }}
        path: |
          ./release_notes_${{ matrix.buildpack }}
          ./${{ matrix.buildpack }}-index-digest.sha256
        retention-days: 1

  release:
    name: Release
    runs-on: ubuntu-24.04
    needs: [release-prep, generate-notes]
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: build/

    - name: Download all release notes artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: release-notes-*
        merge-multiple: true
        path: ./release-notes/

    - name: Assemble Release Notes
      run: |
        cat ./release-notes/release_notes_jvm-vendors > ./release_notes
        for buildpack in adoptium alibaba-dragonwell amazon-corretto azul-zulu bellsoft-liberica eclipse-openj9 graalvm microsoft-openjdk oracle sap-machine; do
          printf "\n\n---\n\n" >> ./release_notes
          cat "./release-notes/release_notes_${buildpack}" >> ./release_notes
        done

    - name: Create release assets
      id: create_release_assets
      run: |
        release_assets='[]'

        for filepath in build/*.cnb; do
          filename=$(basename "$filepath")
          asset_name="${{ github.event.repository.name }}-${{ needs.release-prep.outputs.tag }}-${filename}"
          release_assets=$(echo "$release_assets" | jq --arg name "${asset_name}" --arg path "$filepath" \
            '. + [{"path": $path, "name": $name, "content_type": "application/gzip"}]')
        done

        for filepath in build/*.tgz; do
          filename=$(basename "$filepath")
          asset_name="${{ github.event.repository.name }}-${{ needs.release-prep.outputs.tag }}-${filename}"
          release_assets=$(echo "$release_assets" | jq --arg name "${asset_name}" --arg path "$filepath" \
            '. + [{"path": $path, "name": $name, "content_type": "application/gzip"}]')
        done

        for filepath in ./release-notes/*-index-digest.sha256; do
          filename=$(basename "$filepath")
          asset_name="${{ github.event.repository.name }}-${{ needs.release-prep.outputs.tag }}-${filename}"
          release_assets=$(echo "$release_assets" | jq --arg name "${asset_name}" --arg path "$filepath" \
            '. + [{"path": $path, "name": $name, "content_type": "text/plain"}]')
        done

        release_assets=$(jq -c <<< "$release_assets")
        printf "release_assets=%s\n" "${release_assets}" >> "$GITHUB_OUTPUT"

    - name: Create Release
      uses: paketo-buildpacks/github-config/actions/release/create@main
      with:
        repo: ${{ github.repository }}
        token: ${{ secrets.PAKETO_BOT_GITHUB_TOKEN }}
        tag_name: v${{ needs.release-prep.outputs.tag }}
        target_commitish: ${{ github.sha }}
        name: v${{ needs.release-prep.outputs.tag }}
        body_filepath: "./release_notes"
        draft: true
        assets: ${{ steps.create_release_assets.outputs.release_assets }}

  failure:
    name: Alert on Failure
    runs-on: ubuntu-24.04
    needs: [unit, integration, release-prep, generate-notes, release]
    if: ${{ always() && needs.unit.result == 'failure' || needs.integration.result == 'failure' || needs.release-prep.result == 'failure' || needs.generate-notes.result == 'failure' || needs.release.result == 'failure' }}
    steps:
    - name: File Failure Alert Issue
      uses: paketo-buildpacks/github-config/actions/issue/file@main
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repo: ${{ github.repository }}
        label: "failure:release"
        comment_if_exists: true
        issue_title: "Failure: Create Draft Release workflow"
        issue_body: |
          Create Draft Release workflow [failed](https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}).
        comment_body: |
           Another failure occurred: https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}
